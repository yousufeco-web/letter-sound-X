<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Word Box App</title>
    <style>
        /* General page styling */
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff; 
            color: #222f3e;
        }

        h1.main-title {
            font-size: 48px;
            color: #5f27cd;
            margin-bottom: 20px;
            text-align: center;
        }

        h2.subtitle {
            font-size: 32px;
            color: #ff9f43;
            margin: 30px 0 10px 0;
            text-align: center;
        }

        /* Page Container Logic */
        .page {
            display: none; /* Hides all pages by default */
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        /* Helper class to show the active page */
        .active-page {
            display: flex;
        }

        /* Button Styling for a kid-friendly look */
        .action-btn {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 20px;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            background-color: #3498db;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .word-btn {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            font-size: 24px;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #5f27cd;
            color: #5f27cd;
        }
    </style>
</head>
<body>

    <div id="page7" class="page active-page">
        <h1 class="main-title">WAX</h1>
        
        <img src="wax.jpg" alt="Wax" style="max-width: 300px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
        
        <audio id="audio-w" src="w.mp3"></audio>
        <button onclick="document.getElementById('audio-w').play()" class="action-btn" style="background-color: #ff9f43; font-size: 24px;">
            🔊 Play Sound
        </button>
        
        <div style="margin-top: 30px;">
            <button onclick="showPage('page8')" class="action-btn">Next ➡️</button>
        </div>
    </div>

    <div id="page8" class="page">
        <h2 class="subtitle">I See...</h2>
        
        <div style="font-size: 36px; font-weight: bold; line-height: 2; text-align: center; color: #222f3e; background: white; padding: 20px 40px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <p style="margin: 10px 0;">wax</p>
            <p style="margin: 10px 0;">sticky</p>
            <p style="margin: 10px 0;">brown</p>
        </div>
        
        <div style="margin-top: 30px;">
            <button onclick="showPage('page7')" class="action-btn">⬅️ Back</button>
            <button onclick="showPage('page9')" class="action-btn">Next ➡️</button>
        </div>
    </div>

    <div id="page9" class="page">
        <h2 class="subtitle">Build the Sentence</h2>
        
        <div style="font-size: 28px; margin: 20px 0; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center;">
            The wax is 
            <span id="slot1" onclick="clearSlot('slot1')" style="display: inline-block; min-width: 100px; border-bottom: 4px solid #222f3e; cursor: pointer; text-align: center; color: #5f27cd; font-weight: bold;">_____</span> 
            and 
            <span id="slot2" onclick="clearSlot('slot2')" style="display: inline-block; min-width: 100px; border-bottom: 4px solid #222f3e; cursor: pointer; text-align: center; color: #5f27cd; font-weight: bold;">_____</span>.
        </div>

        <div id="word-bank" style="margin-top: 10px; min-height: 60px;">
            <button id="btn-brown" onclick="fillSlot('brown')" class="word-btn">brown</button>
            <button id="btn-sticky" onclick="fillSlot('sticky')" class="word-btn">sticky</button>
        </div>

        <p id="feedback-message" style="font-size: 24px; font-weight: bold; height: 35px; margin-top: 15px;"></p>

        <div style="margin-top: 10px;">
            <button onclick="showPage('page8')" class="action-btn">⬅️ Back</button>
            <button onclick="checkSentence()" class="action-btn" style="background-color: #10ac84;">✅ Check Answer</button>
        </div>
    </div>

    <script>
        // --- Navigation Logic ---
        function showPage(pageId) {
            // Hide all pages by removing the active-page class
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                page.classList.remove('active-page');
            });
            
            // Show the target page
            document.getElementById(pageId).classList.add('active-page');
        }

        // --- Page 9 Sentence Builder Logic ---
        let selectedWords = { slot1: "", slot2: "" };

        // Move a word from the word bank to an empty slot
        function fillSlot(word) {
            if (!selectedWords.slot1) {
                selectedWords.slot1 = word;
                document.getElementById('slot1').innerText = word;
                document.getElementById('btn-' + word).style.display = 'none';
            } else if (!selectedWords.slot2) {
                selectedWords.slot2 = word;
                document.getElementById('slot2').innerText = word;
                document.getElementById('btn-' + word).style.display = 'none';
            }
            // Clear feedback message when they are interacting
            document.getElementById('feedback-message').innerText = "";
        }

        // Remove a word from a slot and put it back in the word bank
        function clearSlot(slotId) {
            let word = selectedWords[slotId];
            if (word) {
                selectedWords[slotId] = "";
                document.getElementById(slotId).innerText = "_____";
                document.getElementById('btn-' + word).style.display = 'inline-block';
            }
            document.getElementById('feedback-message').innerText = "";
        }

        // Verify if the sentence is correct (interchangeable)
        function checkSentence() {
            const slot1 = selectedWords.slot1;
            const slot2 = selectedWords.slot2;
            const feedback = document.getElementById('feedback-message');

            // Checks if BOTH slots are filled with the correct adjectives, regardless of order
            if ((slot1 === "brown" && slot2 === "sticky") || (slot1 === "sticky" && slot2 === "brown")) {
                feedback.innerText = "⭐ Great job! ⭐";
                feedback.style.color = "#10ac84"; // Green
            } else if (slot1 === "" || slot2 === "") {
                feedback.innerText = "Fill in both blanks!";
                feedback.style.color = "#ff9f43"; // Orange
            } else {
                feedback.innerText = "Keep trying!";
                feedback.style.color = "#ee5253"; // Red
            }
        }
    </script>
</body>
</html>
